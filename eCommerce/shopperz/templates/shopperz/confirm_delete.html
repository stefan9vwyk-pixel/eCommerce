{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Confirm Deletion</h4>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete <strong>"{{ product.title }}"</strong>?</p>
            <p class="text-muted small">This action cannot be undone.</p>
            
            <form method="post">
                {% csrf_token %}
                <!-- The POST request triggers the actual deletion -->
                <button type="submit" class="btn btn-danger">Yes, Delete Product</button>
                
                <!-- The Cancel button simply links back to the store detail -->
                <a href="{% url 'shopperz:store_detail' product.store.id %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
