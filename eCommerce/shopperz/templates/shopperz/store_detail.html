{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'shopperz:vendor_dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item active">{{ store.name }}</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>{{ store.name }} Inventory</h1>
        <a href="{% url 'shopperz:add_product' store.id %}" class="btn btn-primary">Add Product</a>
    </div>

    <table class="table table-hover mt-3">
        <thead class="table-light">
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for product in store.products.all %}
            <tr>
                <td>{{ product.name }}</td>
                <td>R{{ product.price }}</td>
                <td>{{ product.stock }}</td>
                <td>
                    <a href="{% url 'shopperz:update_product' store.id product.id %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'shopperz:delete_product' product.id %}" class="btn btn-sm btn-outline-danger">Remove</a>
                    <a href="{% url 'shopperz:product_page' product.name %}" class="btn btn-primary">Details</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
