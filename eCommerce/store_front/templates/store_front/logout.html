{% extends "base.html" %}

{% block title %}Logged Out - Shopperz{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm border-0 mx-auto text-center" style="max-width: 500px;">
        <div class="card-body p-5">
            <div class="mb-4">
                <i class="fas fa-sign-out-alt text-secondary" style="font-size: 4rem;"></i>
            </div>
            <h2 class="fw-bold">You are now logged out</h2>
            <p class="text-muted mb-4">Thank you for visiting Shopperz. Come back soon!</p>
            
            <div class="d-grid gap-2">
                <a href="{% url 'login' %}" class="btn btn-primary">Log In Again</a>
                <a href="{% url 'eCommerce:products_list' %}" class="btn btn-outline-secondary">Return to Shop</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
